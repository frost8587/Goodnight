<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message From The Universe</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Courier New, monospace;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}
 
#container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
z-index:2;
}

#text{
font-size:28px;
letter-spacing:2px;
min-height:40px;
}

#name{
display:none;
font-size:70px;
color:#ff4d6d;
text-shadow:0 0 25px #ff4d6d;
animation:glow 2s infinite alternate;
margin-top:20px;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff4d6d }
to{ text-shadow:0 0 50px #ff4d6d }
}

#heart{
display:none;
font-size:60px;
animation:beat 1s infinite;
margin-top:20px;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

#final{
display:none;
font-size:24px;
margin-top:30px;
line-height:1.6;
}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:10px 16px;
background:#ff4d6d;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
z-index:3;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="container">
<div id="text"></div>

<div id="name">BABYBOO</div>

<div id="heart">❤️</div>

<div id="final">
Good night Babyboo 🌙<br><br>
Among billions of stars in the universe,<br>
one of them reminded me of you tonight.<br><br>
Sleep well.<br>
Someone is thinking about you.
</div>
</div>

<button id="musicBtn">🎵 Play Music</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c7e1d42f4.mp3" type="audio/mpeg">
</audio>

<script>

// CANVAS

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let stars=[]
let shootingStars=[]

// stars
for(let i=0;i<300;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5+0.1
})
}

// shooting star
function createShootingStar(){

shootingStars.push({
x:Math.random()*canvas.width,
y:0,
len:Math.random()*80+10,
speed:Math.random()*10+6
})

}

setInterval(createShootingStar,4000)

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

})

ctx.strokeStyle="white"
ctx.lineWidth=2

shootingStars.forEach((s,index)=>{

ctx.beginPath()
ctx.moveTo(s.x,s.y)
ctx.lineTo(s.x+s.len,s.y+s.len)
ctx.stroke()

s.x+=s.speed
s.y+=s.speed

if(s.x>canvas.width || s.y>canvas.height){
shootingStars.splice(index,1)
}

})

requestAnimationFrame(animate)

}

animate()

// TYPING EFFECT

const messages=[
"Scanning the universe...",
"Searching for someone special...",
"Signal detected...",
"Preparing message...",
"Before you sleep tonight..."
]

let m=0
let c=0

function type(){

const text=document.getElementById("text")

if(c < messages[m].length){

text.innerHTML+=messages[m].charAt(c)
c++

setTimeout(type,40)

}else{

setTimeout(next,1500)

}

}

function next(){

m++
c=0
document.getElementById("text").innerHTML=""

if(m < messages.length){

type()

}else{

reveal()

}

}

function reveal(){

document.getElementById("text").style.display="none"
document.getElementById("name").style.display="block"

setTimeout(()=>{
document.getElementById("heart").style.display="block"
},2000)

setTimeout(()=>{
document.getElementById("final").style.display="block"
},4000)

}

type()

// MUSIC

const music=document.getElementById("music")
const btn=document.getElementById("musicBtn")

btn.onclick=()=>{
music.play()
btn.innerHTML="🎶 Playing"
}

</script>

</body>
</html>
