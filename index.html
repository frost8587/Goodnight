<!DOCTYPE html>
<html>
<head>
<title>A Message In The Sky</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Courier New, monospace;
overflow:hidden;
text-align:center;
}

#text{
position:absolute;
top:20%;
width:100%;
font-size:28px;
}

#final{
display:none;
position:absolute;
top:50%;
width:100%;
font-size:34px;
color:#ff6b81;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="text"></div>

<div id="final">
Good night Babyboo 🌙<br><br>
Somewhere under this same sky,<br>
someone is smiling because of you.<br><br>
Sleep well.
</div>

<script>

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
d:Math.random()*0.5
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y += s.d;

if(s.y>canvas.height){
s.y=0;
}

});

requestAnimationFrame(drawStars);

}

drawStars();


// typing text

let messages=[
"Searching the sky...",
"Looking for someone special...",
"Signal found.",
"Transmitting message..."
]

let i=0
let j=0
let current=""

function type(){

if(j < messages[i].length){

current += messages[i].charAt(j)
document.getElementById("text").innerHTML=current
j++
setTimeout(type,40)

}else{

setTimeout(next,1200)

}

}

function next(){

i++
j=0
current=""

if(i < messages.length){

type()

}else{

showName()

}

}

function showName(){

document.getElementById("text").innerHTML="⭐ BABYBOO ⭐"

setTimeout(()=>{

document.getElementById("text").style.display="none"
document.getElementById("final").style.display="block"

},3000)

}

type()

</script>

</body>
</html>
